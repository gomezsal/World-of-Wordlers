<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle Strategies Dashboard</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <button class="nav-btn active" data-section="home">Home</button>
        <button class="nav-btn" data-section="favourites">Favourites</button>
    </nav>
    <header>
        <h1>Wordle Strategies Dashboard</h1>
    </header>

    <div class="controls">
        <button id="refreshDataBtn">REFRESH DATA</button>
    </div>

    <main>
        <div id="loading" class="loading" style="display: none;">
            Loading data from Google Forms...
        </div>

        <section id="go-to-words" class="dashboard-section">
            <h2>Popular Go-To Words</h2>
            <div id="goToWordsContainer"></div>
        </section>

        <section id="playing-times" class="dashboard-section">
            <h2>At what time are people playing wordle?</h2>
            <div id="timesChart"></div>
        </section>

        <section id="strategies" class="dashboard-section">
            <h2>Learn a new Strategy</h2>
            <div id="strategiesList"></div>
        </section>
    </main>

    <script src="./main.js" type="module"></script>
</body>
</html>
